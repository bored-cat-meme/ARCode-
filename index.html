<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Roulette</title>
<style>
  :root{
    --bg-1:#ff7a1a;
    --bg-2:#ff8c2b;
    --accent:#ffd43b;
    --accent-2:#ff5d8f;
    --card-bg:#221c40;
    --text:#f5f2ff;
    --muted:#a89fce;
  }
 
  *{box-sizing:border-box;}
 
  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.08), transparent 45%),
      linear-gradient(160deg, var(--bg-2), var(--bg-1));
    color:var(--text);
    font-family:'Segoe UI', 'Trebuchet MS', system-ui, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
 
  .stage{
    perspective:1200px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
    padding:20px;
  }
 
  .card{
    position:relative;
    width:min(88vw, 420px);
    aspect-ratio: 4 / 5;
    border-radius:22px;
    background:var(--card-bg);
    box-shadow:
      0 25px 50px -15px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.05) inset;
    transform-style:preserve-3d;
    transition:transform 0.15s ease-out, box-shadow 0.3s;
    cursor:pointer;
    overflow:hidden;
    will-change:transform;
  }
 
  .card:active{ transform: scale(0.98) !important; }
 
  .card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transform:translateZ(40px) scale(1.02);
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
 
  .shine{
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, rgba(255,255,255,0.25), transparent 40%);
    opacity:0;
    transition:opacity 0.2s;
    mix-blend-mode:overlay;
    pointer-events:none;
  }
  .card:hover .shine{ opacity:1; }
</style>
</head>
<body>
 
  <div class="stage">
    <div class="card" id="card">
      <img id="memeImg" src="" alt="">
      <div class="shine"></div>
    </div>
  </div>
 
<script>
  /* ============================================================
     ส่วนที่ 1: ระบบเก็บบันทึกสถิติผู้เข้าชมลง Google Sheets
     ============================================================ */
  window.addEventListener('DOMContentLoaded', (event) => {
    
    // ลิงก์ Google Apps Script ของคุณ
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnYVMQxWt8r1MknJuP4Kjoz3OpRCrNachNpIzpHW8SyblVg8rGN58KnI_y9eK60gSU/exec'; 

    // ยิง API ส่งข้อมูลไป Google Sheets ทันทีแบบไม่บล็อก CORS (สำหรับ Github Pages)
    fetch(APPS_SCRIPT_URL, {
        method: 'GET',
        mode: 'no-cors' 
    })
    .then(() => console.log('ส่งคำขอเก็บบันทึกสถิติไปที่ Google Sheets แล้ว'))
    .catch(error => console.error('เกิดข้อผิดพลาดในการส่งข้อมูล:', error));
    
  });


  /* ============================================================
     ส่วนที่ 2: ระบบ Meme Roulette (คลังรูปมีมและเอฟเฟกต์)
     ============================================================ */
  const memes = [
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2jOVfA9GudNZN7VPub072Y1PUnsBSgFVur0VjYjMjzQlCu745uTsqkiTl&s=10",
    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhQ6b0XVJmuMGY6UNhtDyi8znh78jEKucAlZY4SC-3H_QFQ-m6_GK8O5_Yrc4dchEBxkqCo3-e5q4efnObpU1GxpBAjp8slzqLw0FGNDdnI-_5QE0AFJQzqkcDxPJ3BguyL3Q-T944EBcw/s680/E177ydyVoAEml4u.jpg",
    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwjqMr6iEQzFDSxDWC33RJQbGXNthipEHfeGjucWQqHdETFcPuKYWg2LxvpEkKXDMpl_ohOZqPosJfhyHkmbGRSmJRwDJuhRE3PrQAItUIxq6TQuS-Bi6HpTVvqSPDGO7fNjYAR5FzKko/s1020/panda3.jpeg",
    "https://img.salehere.co.th/p/1200x0/2021/06/07/nzdinhm5nanv.jpg",
    "https://img.salehere.co.th/p/1200x0/2021/04/12/gl56hpbkibss.jpg",
    "https://i.pinimg.com/originals/84/ff/f1/84fff14584dea9b10cbf65252d04a218.jpg",
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaiXjhlU2krgck5_6JJU_ptpV8OR_J7B4tRgjLC-S4UScEz06l3HkE5fu7&s=10",
    "https://pbs.twimg.com/media/Dr0JNJ2U8AAOT3w.jpg",
  ];
 
  const card = document.getElementById('card');
  const img = document.getElementById('memeImg');
 
  let lastIndex = -1;
 
  function pickRandomMeme(){
    let idx;
    do {
      idx = Math.floor(Math.random() * memes.length);
    } while (memes.length > 1 && idx === lastIndex);
    lastIndex = idx;
 
    img.style.opacity = 0;
    setTimeout(() => {
      img.src = memes[idx];
      img.style.opacity = 1;
    }, 120);
  }
 
  img.style.transition = "opacity 0.15s ease";
 
  // สุ่มรูปทันทีที่เปิดหน้า
  pickRandomMeme();
 
  card.addEventListener('click', pickRandomMeme);
 
</script>
 
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Roulette</title>
<style>
  :root {
    --bg-1: #ff7a1a;
    --bg-2: #ff8c2b;
    --accent: #ffd43b;
    --accent-2: #ff5d8f;
    --card-bg: #221c40;
    --text: #f5f2ff;
    --muted: #a89fce;
  }
 
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
 
  html, body {
    height: 100%;
    background: 
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.08), transparent 45%),
      linear-gradient(160deg, var(--bg-2), var(--bg-1));
    color: var(--text);
    font-family: 'Segoe UI', 'Trebuchet MS', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
 
  .stage {
    perspective: 1200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    padding: 20px;
    width: 100%;
  }
 
  .card {
    position: relative;
    width: min(88vw, 400px);
    aspect-ratio: 4 / 5;
    border-radius: 22px;
    background: var(--card-bg);
    box-shadow: 
      0 30px 60px -15px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.1) inset;
    transform-style: preserve-3d;
    transition: transform 0.1s ease, box-shadow 0.3s;
    cursor: pointer;
    overflow: hidden;
    will-change: transform;
  }
 
  .card:active { 
    transform: scale(0.95) !important; 
    transition: transform 0.05s ease;
  }
 
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: translateZ(40px) scale(1.05);
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    transition: opacity 0.2s ease-in-out;
    background: var(--card-bg);
  }
 
  .shine {
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255,255,255,0.3), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    mix-blend-mode: overlay;
    pointer-events: none;
    transform: translateZ(50px);
    border-radius: 22px;
  }
  
  .card:hover .shine { 
    opacity: 1; 
  }
</style>
</head>
<body>
 
  <div class="stage">
    <div class="card" id="card">
      <img id="memeImg" src="" alt="Meme image">
      <div class="shine" id="shine"></div>
    </div>
  </div>
 
<script>
  const memes = [
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2jOVfA9GudNZN7VPub072Y1PUnsBSgFVur0VjYjMjzQlCu745uTsqkiTl&s=10",
    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhQ6b0XVJmuMGY6UNhtDyi8znh78jEKucAlZY4SC-3H_QFQ-m6_GK8O5_Yrc4dchEBxkqCo3-e5q4efnObpU1GxpBAjp8slzqLw0FGNDdnI-_5QE0AFJQzqkcDxPJ3BguyL3Q-T944EBcw/s680/E177ydyVoAEml4u.jpg",
    "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwjqMr6iEQzFDSxDWC33RJQbGXNthipEHfeGjucWQqHdETFcPuKYWg2LxvpEkKXDMpl_ohOZqPosJfhyHkmbGRSmJRwDJuhRE3PrQAItUIxq6TQuS-Bi6HpTVvqSPDGO7fNjYAR5FzKko/s1020/panda3.jpeg",
    "https://img.salehere.co.th/p/1200x0/2021/06/07/nzdinhm5nanv.jpg",
    "https://img.salehere.co.th/p/1200x0/2021/04/12/gl56hpbkibss.jpg",
    "https://i.pinimg.com/originals/84/ff/f1/84fff14584dea9b10cbf65252d04a218.jpg",
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaiXjhlU2krgck5_6JJU_ptpV8OR_J7B4tRgjLC-S4UScEz06l3HkE5fu7&s=10",
    "https://pbs.twimg.com/media/Dr0JNJ2U8AAOT3w.jpg",
  ];
 
  // Preload images for smoother experience
  memes.forEach(url => {
    const img = new Image();
    img.src = url;
  });

  const card = document.getElementById('card');
  const img = document.getElementById('memeImg');
  const shine = document.getElementById('shine');
 
  let lastIndex = -1;
 
  function pickRandomMeme() {
    let idx;
    do {
      idx = Math.floor(Math.random() * memes.length);
    } while (memes.length > 1 && idx === lastIndex);
    lastIndex = idx;
 
    img.style.opacity = 0;
    setTimeout(() => {
      img.src = memes[idx];
      img.onload = () => {
        img.style.opacity = 1;
      };
    }, 150);
  }
 
  // สุ่มรูปทันทีที่เปิดหน้า
  pickRandomMeme();
  
  // ฟังก์ชันสำหรับส่งข้อมูลไป Google Sheets เพื่อนับยอดเข้าชมเว็บ
  function trackPageVisit() {
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnYVMQxWt8r1MknJuP4Kjoz3OpRCrNachNpIzpHW8SyblVg8rGN58KnI_y9eK60gSU/exec'; 

    // ใช้ fetch แบบ no-cors เพื่อทะลุกำแพงระบบป้องกัน CORS ของ GitHub Pages
    fetch(APPS_SCRIPT_URL + "?action=visit&t=" + new Date().getTime(), {
      method: 'GET',
      mode: 'no-cors'
    }).then(() => {
      console.log('บันทึกการเข้าชมไปที่ Google Sheets สำเร็จ');
    }).catch(err => {
      console.error('พบปัญหาในการบันทึกข้อมูล:', err);
    });
  }

  // เรียกใช้ฟังก์ชันบันทึกข้อมูลทันทีเมื่อหน้าเว็บโหลดเสร็จ
  window.addEventListener('load', trackPageVisit);

  // สร้างฟังก์ชันให้การ์ดเอียงตามตำแหน่งเมาส์/นิ้ว
  function handleMove(e) {
    const rect = card.getBoundingClientRect();
    
    // คำนวณหาตำแหน่งพิกัด X, Y
    let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

    const x = clientX - rect.left;
    const y = clientY - rect.top;
    
    // หาจุดศูนย์กลาง
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    // คำนวณองศาการหมุน (ปรับตัวเลขเพื่อเพิ่ม/ลดความชัน)
    const rotateX = ((y - centerY) / centerY) * -15;
    const rotateY = ((x - centerX) / centerX) * 15;
    
    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    
    // อัปเดตแสงสะท้อนให้สมจริงตามพิกัด
    const shineX = (x / rect.width) * 100;
    const shineY = (y / rect.height) * 100;
    shine.style.background = `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.4) 0%, transparent 60%)`;
  }

  function handleReset() {
    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
    shine.style.background = `linear-gradient(120deg, rgba(255,255,255,0.3), transparent 50%)`;
  }

  // ผูก Event Listener สำหรับ Desktop และ Mobile
  card.addEventListener('mousemove', handleMove);
  card.addEventListener('mouseleave', handleReset);
  
  card.addEventListener('touchmove', (e) => {
    // ป้องกันหน้าจอเลื่อนเวลาถูบนการ์ด
    e.preventDefault(); 
    handleMove(e);
  }, { passive: false });
  card.addEventListener('touchend', handleReset);

</script>
</body>
</html>
